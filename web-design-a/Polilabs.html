<!doctype html>
<html lang="en" data-theme="light" data-density="default">
<head>
  <meta charset="utf-8" />
  <title>Polilabs — Research Workspace (design-a)</title>
  <!-- Responsive viewport: width=device-width lets the browser pick
       the actual device width instead of forcing a 1440px desktop
       layout. initial-scale=1 prevents zoom-on-load on iOS;
       viewport-fit=cover extends the layout under the iPhone notch
       in landscape. Pair with the workspace @media blocks in
       styles.css. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <!-- ?v=… is a cache-buster. Bump ASSET_VERSION on every deploy that
       changes JSX/CSS so browsers (and Vercel's edge CDN) fetch the
       new file instead of serving a stale copy. The vercel.json
       headers rule already forces revalidation on these files, but
       the query string is belt-and-suspenders. -->
  <link rel="stylesheet" href="styles.css?v=20260530-2" />
  <link rel="stylesheet" href="auth.css?v=20260530-2" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Auth client — loaded before backend.js so the session token is
       available when backend.js attaches its Authorization header. -->
  <script src="auth.js?v=20260530-2"></script>

  <!-- Real backend adapter (replaces the static data.js mock). -->
  <script src="backend.js?v=20260530-2"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx?v=20260530-2"></script>
  <script type="text/babel" src="icons.jsx?v=20260530-2"></script>
  <script type="text/babel" src="left-rail.jsx?v=20260530-2"></script>
  <script type="text/babel" src="text-panel.jsx?v=20260530-2"></script>
  <script type="text/babel" src="decomp-panel.jsx?v=20260530-2"></script>
  <script type="text/babel" src="bill-viewer.jsx?v=20260530-2"></script>
  <script type="text/babel" src="auth-screen.jsx?v=20260530-2"></script>
  <script type="text/babel" src="landing.jsx?v=20260530-2"></script>
  <script type="text/babel" src="app.jsx?v=20260530-2"></script>
</body>
</html>
